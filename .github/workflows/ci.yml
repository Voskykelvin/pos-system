name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Unit and component tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run test:bundle

      - name: Smoke test API and workflows
        run: npm run smoke
        env:
          ENABLE_ETIMS_SCHEDULER: "false"
          AUTH_TOKEN_SECRET: ci-smoke-secret

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser checkout tests
        run: npm run test:e2e:run
        env:
          ENABLE_ETIMS_SCHEDULER: "false"
          AUTH_TOKEN_SECRET: ci-browser-secret

      - name: Dependency audit
        run: npm audit --omit=dev

  postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pos
          POSTGRES_PASSWORD: pos
          POSTGRES_DB: pos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pos -d pos_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://pos:pos@localhost:5432/pos_ci
      DB_SSL: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Apply migrations
        run: npm run db:migrate
      - name: PostgreSQL migration and contention checks
        run: npm run test:postgres
      - name: Verify migration idempotency
        run: npm run db:migrate
      - name: Backup and restore drill
        run: |
          mkdir -p tmp
          npm run db:backup -- --output tmp/ci.dump
          PGPASSWORD=pos createdb -h localhost -U pos pos_restore_ci
          BACKUP_VERIFY_DATABASE_URL=postgresql://pos:pos@localhost:5432/pos_restore_ci npm run db:verify-backup -- --file tmp/ci.dump
