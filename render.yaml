services:
  - type: web
    name: pos-system
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:sync
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pos-system-db
          property: connectionString
      - key: BUSINESS_TIME_ZONE
        value: Africa/Nairobi
      - key: ENABLE_ETIMS_SCHEDULER
        value: "false"
      - key: BUSINESS_NAME
        sync: false
      - key: BUSINESS_KRA_PIN
        sync: false
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: ETIMS_ENV
        value: sandbox
      - key: ETIMS_BASE_URL
        sync: false
      - key: ETIMS_API_KEY
        sync: false
      - key: ETIMS_DEVICE_SERIAL
        sync: false

databases:
  - name: pos-system-db
    plan: basic-256mb
    databaseName: pos_system
    user: pos_system
