<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Mode - Jijenge POS</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      text-align: center;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 40px 24px;
      max-width: 480px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #fef3c7;
      color: #d97706;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: bold;
      margin: 0 auto 20px auto;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px 0;
    }
    p {
      font-size: 16px;
      color: #64748b;
      margin: 0 0 24px 0;
      line-height: 1.5;
    }
    button {
      background: #059669;
      color: #ffffff;
      border: 0;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #047857;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <h1>You are offline</h1>
    <p>Jijenge POS is running in offline mode. You can still use the checkout dashboard to register sales. They will be queued locally and synchronized automatically when your connection is restored.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
